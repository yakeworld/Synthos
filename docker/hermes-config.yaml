# Synthos — Hermes Agent Configuration
# Auto-generated for Docker deployment by entrypoint.sh

model:
  default: deepseek/deepseek-v4-flash
  provider: deepseek

agent:
  max_turns: 120
  tool_use_enforcement: true

terminal:
  backend: local
  timeout: 300

compression:
  enabled: true
  threshold: 0.45
  target_ratio: 0.20

display:
  skin: default
  show_cost: true

security:
  tirith_enabled: true

delegation:
  model: deepseek/deepseek-v4-flash
  provider: deepseek
  max_iterations: 30

memory:
  memory_enabled: true
  user_profile_enabled: true
  provider: builtin

mcp_servers: {}
